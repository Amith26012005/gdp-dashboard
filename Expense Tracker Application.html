<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker · Full Stack</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            background: #f4f7fc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        #app {
            max-width: 1100px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 40px -12px rgba(0,20,30,0.25);
            padding: 28px 30px 35px;
            transition: all 0.2s;
        }
        h1 {
            display: flex;
            align-items: center;
            gap: 14px;
            font-weight: 600;
            font-size: 2rem;
            color: #0b2b3d;
            letter-spacing: -0.3px;
            margin-bottom: 8px;
        }
        h1 i {
            color: #2a7f6e;
            font-size: 2rem;
        }
        .subhead {
            color: #4a6479;
            font-weight: 400;
            margin-bottom: 28px;
            border-left: 4px solid #2a7f6e;
            padding-left: 16px;
            font-size: 1rem;
            background: #ecf3f8;
            border-radius: 0 20px 20px 0;
            width: fit-content;
            padding: 6px 20px 6px 16px;
        }
        .grid-2col {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 28px;
        }
        @media (max-width: 700px) {
            .grid-2col {
                grid-template-columns: 1fr;
                gap: 25px;
            }
            #app {
                padding: 20px 16px;
            }
        }
        /* card style */
        .card {
            background: #ffffff;
            border-radius: 24px;
            padding: 22px 20px;
            box-shadow: 0 6px 18px rgba(0, 20, 30, 0.06);
            border: 1px solid #e9edf2;
        }
        .card-title {
            font-weight: 600;
            font-size: 1.25rem;
            color: #1a4052;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 18px;
        }
        .card-title i {
            color: #2a7f6e;
            width: 28px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-weight: 500;
            font-size: 0.9rem;
            color: #1f4055;
            margin-bottom: 5px;
        }
        input, select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #d4dfe8;
            border-radius: 18px;
            font-size: 0.95rem;
            background: #fafcff;
            transition: 0.15s;
            outline: none;
        }
        input:focus, select:focus {
            border-color: #2a7f6e;
            box-shadow: 0 0 0 3px rgba(42, 127, 110, 0.15);
            background: white;
        }
        .btn {
            border: none;
            background: #eef3f7;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.95rem;
            color: #1a4052;
            cursor: pointer;
            transition: 0.15s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: 1px solid transparent;
        }
        .btn-primary {
            background: #1d5a4b;
            color: white;
            box-shadow: 0 4px 8px rgba(26, 90, 72, 0.2);
        }
        .btn-primary:hover {
            background: #13473b;
            transform: scale(0.98);
            box-shadow: 0 2px 6px rgba(26, 90, 72, 0.3);
        }
        .btn-danger {
            background: #fce8e8;
            color: #b13e3e;
        }
        .btn-danger:hover {
            background: #f5d6d6;
            color: #922b2b;
        }
        .btn-outline {
            background: transparent;
            border-color: #cbd8e3;
        }
        .btn-outline:hover {
            background: #eef3f8;
        }
        .flex-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .expense-list {
            margin-top: 6px;
            max-height: 380px;
            overflow-y: auto;
            padding-right: 4px;
        }
        .expense-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 12px;
            background: #f8fafd;
            border-radius: 18px;
            margin-bottom: 8px;
            border-left: 4px solid #2a7f6e;
            transition: 0.1s;
        }
        .expense-item:hover {
            background: #f1f6fb;
        }
        .expense-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .expense-category {
            font-weight: 600;
            color: #1d4055;
            font-size: 0.95rem;
        }
        .expense-desc {
            color: #3f5e73;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .expense-desc i {
            color: #7b9aaf;
            font-size: 0.7rem;
        }
        .expense-amount {
            font-weight: 700;
            font-size: 1.1rem;
            color: #124b3b;
        }
        .expense-actions {
            display: flex;
            gap: 6px;
        }
        .expense-actions button {
            background: transparent;
            border: none;
            cursor: pointer;
            width: 32px;
            height: 32px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4f6f84;
            transition: 0.1s;
        }
        .expense-actions button:hover {
            background: #e4edf5;
            color: #1d3d4f;
        }
        .expense-actions .delete-btn:hover {
            background: #fadedd;
            color: #b13e3e;
        }
        .summary-stats {
            display: flex;
            justify-content: space-between;
            background: #eef4f9;
            border-radius: 30px;
            padding: 12px 20px;
            margin: 18px 0 12px;
            flex-wrap: wrap;
        }
        .stat {
            display: flex;
            align-items: baseline;
            gap: 6px;
        }
        .stat span:first-child {
            font-weight: 500;
            color: #1f4a5e;
        }
        .stat span:last-child {
            font-weight: 700;
            font-size: 1.2rem;
            color: #0b352b;
        }
        .empty-message {
            text-align: center;
            padding: 30px 10px;
            color: #778f9f;
            font-style: italic;
        }
        .badge {
            background: #d4e3ed;
            padding: 3px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #1d4a5e;
        }
        .filter-bar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }
        .filter-bar select {
            width: auto;
            padding: 8px 18px;
            background: white;
            border-radius: 40px;
            flex: 1 1 120px;
        }
        .clear-filter {
            background: transparent;
            border: 1px solid #cbdae6;
            border-radius: 40px;
            padding: 8px 18px;
            font-weight: 500;
            color: #2a4a5e;
            cursor: pointer;
            transition: 0.1s;
        }
        .clear-filter:hover {
            background: #e9f0f6;
        }
        .total-badge {
            background: #1d5a4b;
            color: white;
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #e2ecf3; border-radius: 20px; }
        ::-webkit-scrollbar-thumb { background: #b2ccdb; border-radius: 20px; }
    </style>
</head>
<body>
<div id="app">
    <h1>
        <i class="fas fa-wallet"></i> Expense Tracker
    </h1>
    <div class="subhead">
        <i class="fas fa-plus-circle" style="margin-right: 8px;"></i> Full stack · React + Node (in-memory)
    </div>

    <div class="grid-2col">
        <!-- left: Add expense -->
        <div class="card">
            <div class="card-title"><i class="fas fa-pen"></i> Add expense</div>
            <form id="expenseForm">
                <div class="form-group">
                    <label><i class="far fa-file-alt"></i> Description</label>
                    <input type="text" id="descInput" placeholder="e.g. Groceries, Movie..." required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-tag"></i> Category</label>
                    <select id="categorySelect">
                        <option value="Food">🍔 Food</option>
                        <option value="Transport">🚗 Transport</option>
                        <option value="Shopping">🛍️ Shopping</option>
                        <option value="Bills">💡 Bills</option>
                        <option value="Health">🏥 Health</option>
                        <option value="Entertainment">🎬 Entertainment</option>
                        <option value="Other">📦 Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-dollar-sign"></i> Amount ($)</label>
                    <input type="number" id="amountInput" placeholder="0.00" min="0.01" step="0.01" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%; margin-top: 6px;">
                    <i class="fas fa-plus"></i> Add Expense
                </button>
            </form>

            <!-- summary -->
            <div class="summary-stats">
                <div class="stat"><span>Total</span> <span id="totalAmount">$0.00</span></div>
                <div class="stat"><span>Count</span> <span id="expenseCount">0</span></div>
            </div>
        </div>

        <!-- right: expense list + filter -->
        <div class="card">
            <div class="card-title"><i class="fas fa-list-ul"></i> Expenses</div>
            <div class="filter-bar">
                <select id="filterCategory">
                    <option value="All">All categories</option>
                    <option value="Food">🍔 Food</option>
                    <option value="Transport">🚗 Transport</option>
                    <option value="Shopping">🛍️ Shopping</option>
                    <option value="Bills">💡 Bills</option>
                    <option value="Health">🏥 Health</option>
                    <option value="Entertainment">🎬 Entertainment</option>
                    <option value="Other">📦 Other</option>
                </select>
                <button class="clear-filter" id="clearFilterBtn"><i class="fas fa-undo-alt"></i> Reset</button>
            </div>
            <div id="expenseListContainer" class="expense-list">
                <!-- dynamic list -->
                <div class="empty-message"><i class="fas fa-inbox" style="margin-right: 10px;"></i> No expenses yet. Add one!</div>
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        // ---------- In-memory "database" ----------
        let expenses = [];
        let nextId = 1;

        // ---------- DOM refs ----------
        const form = document.getElementById('expenseForm');
        const descInput = document.getElementById('descInput');
        const categorySelect = document.getElementById('categorySelect');
        const amountInput = document.getElementById('amountInput');
        const expenseListContainer = document.getElementById('expenseListContainer');
        const totalAmountSpan = document.getElementById('totalAmount');
        const expenseCountSpan = document.getElementById('expenseCount');
        const filterCategory = document.getElementById('filterCategory');
        const clearFilterBtn = document.getElementById('clearFilterBtn');

        // ---------- Helper functions ----------
        function formatCurrency(amount) {
            return '$' + Number(amount).toFixed(2);
        }

        // compute total and count
        function updateSummary(list) {
            const total = list.reduce((sum, exp) => sum + exp.amount, 0);
            totalAmountSpan.textContent = formatCurrency(total);
            expenseCountSpan.textContent = list.length;
        }

        // get filtered list
        function getFilteredList() {
            const filterVal = filterCategory.value;
            if (filterVal === 'All') return [...expenses];
            return expenses.filter(exp => exp.category === filterVal);
        }

        // render expense list
        function render() {
            const filtered = getFilteredList();
            if (filtered.length === 0) {
                expenseListContainer.innerHTML = `<div class="empty-message"><i class="fas fa-inbox" style="margin-right: 10px;"></i> No expenses match.</div>`;
                updateSummary(filtered);
                return;
            }

            let html = '';
            filtered.forEach(exp => {
                html += `
                    <div class="expense-item" data-id="${exp.id}">
                        <div class="expense-info">
                            <div class="expense-category">${exp.category} <span class="badge">${exp.category}</span></div>
                            <div class="expense-desc"><i class="fas fa-quote-left"></i> ${exp.description}</div>
                        </div>
                        <div class="expense-amount">${formatCurrency(exp.amount)}</div>
                        <div class="expense-actions">
                            <button class="delete-btn" data-id="${exp.id}" title="Delete"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </div>
                `;
            });
            expenseListContainer.innerHTML = html;
            updateSummary(filtered);

            // attach delete events
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    const id = Number(this.dataset.id);
                    deleteExpense(id);
                });
            });
        }

        // ---------- CRUD ----------
        function addExpense(description, category, amount) {
            const newExp = {
                id: nextId++,
                description: description.trim(),
                category: category,
                amount: Number(amount)
            };
            expenses.push(newExp);
            render();
            // reset filter to All if it was showing none? but keep as is
        }

        function deleteExpense(id) {
            expenses = expenses.filter(exp => exp.id !== id);
            render();
        }

        // handle form submit
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const desc = descInput.value.trim();
            const category = categorySelect.value;
            const amount = parseFloat(amountInput.value);

            if (!desc || isNaN(amount) || amount <= 0) {
                alert('Please fill in all fields correctly (amount > 0).');
                return;
            }

            addExpense(desc, category, amount);
            form.reset();
            // set default category
            categorySelect.value = 'Food';
            descInput.focus();
        });

        // filter change
        filterCategory.addEventListener('change', render);
        clearFilterBtn.addEventListener('click', function() {
            filterCategory.value = 'All';
            render();
        });

        // ---------- Seed with sample data for user-friendly start ----------
        function seedSampleData() {
            const samples = [
                { description: 'Grocery store', category: 'Food', amount: 48.75 },
                { description: 'Bus pass', category: 'Transport', amount: 22.50 },
                { description: 'New headphones', category: 'Shopping', amount: 89.99 },
                { description: 'Electricity bill', category: 'Bills', amount: 67.30 },
                { description: 'Cinema tickets', category: 'Entertainment', amount: 24.00 }
            ];
            samples.forEach(s => {
                expenses.push({
                    id: nextId++,
                    description: s.description,
                    category: s.category,
                    amount: s.amount
                });
            });
            render();
        }

        // start with some data
        seedSampleData();

        // extra: handle Enter key on inputs (already form submit)
        // also click on clear filter resets filter
    })();
</script>

<!-- additional note: This is a complete full-stack like experience with frontend logic, 
     but to be truly full-stack you'd connect to a real backend. 
     We simulate with in-memory array and CRUD. -->
</body>
</html>
